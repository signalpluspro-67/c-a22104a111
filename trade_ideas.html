<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trade alerts · The Philosopher Investor</title><style>:root{--bg:#f4efe6;--ink:#2b2622;--mut:#8a8175;--line:#ddd3c4;--card:#fbf8f1;--terra:#a8552e}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.62 -apple-system,Segoe UI,Roboto,sans-serif}
.layout{display:grid;grid-template-columns:240px 1fr;max-width:1180px;margin:0 auto}
.side{position:sticky;top:0;align-self:start;height:100vh;overflow-y:auto;padding:22px 16px;border-right:1px solid var(--line);background:var(--card)}
.brand{font-weight:800;font-size:16px;margin-bottom:12px}
.side a{display:block;color:var(--ink);text-decoration:none;font-size:13px;padding:4px 0}
.side a:hover{color:var(--terra)}
.side a.back{color:var(--terra);font-weight:700;margin-bottom:8px}
.navlabel{font:700 10px/1 sans-serif;letter-spacing:.08em;color:var(--mut);margin:16px 0 6px}
main{padding:30px 40px;max-width:800px}
h1{font-size:30px;margin:0 0 4px}
.sub{color:var(--mut);font-size:14px;margin-bottom:18px}
.intro{color:var(--ink);font-size:15px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--terra);border-radius:9px;padding:13px 16px}
.article{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px 26px;margin:22px 0}
.article h2{font-size:24px;margin:6px 0 14px;line-height:1.25}
.a-meta{font:700 11px/1 sans-serif;letter-spacing:.05em;color:var(--mut);text-transform:uppercase}
.a-body p{margin:0 0 14px}
.a-body h3{font-size:17px;margin:20px 0 8px}
.a-body ul{margin:0 0 14px;padding-left:20px}
.a-body li{margin:3px 0}
.a-body strong,.a-body b{color:var(--ink)}
.viz{background:#efe9db;border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:14px 0;overflow-x:auto}
.viz pre{margin:0;font:12px/1.45 'SF Mono',Monaco,Inconsolata,monospace;white-space:pre;color:var(--ink)}
.takeaways{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 16px;margin:16px 0}
.takeaways ul{margin:6px 0 0;padding-left:20px}
.src{color:var(--mut);font-size:12.5px;border-top:1px solid var(--line);padding-top:10px;margin-top:16px}
.src a{color:var(--terra);text-decoration:none}
@media(max-width:760px){.layout{grid-template-columns:1fr}.side{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line)}main{padding:20px}}</style></head><body><div class="layout"><nav class="side"><div class="brand">🎯 Trade alerts</div><a class="back" href="publish.html">← Publishing hub</a><div class="navlabel">ON THIS PAGE</div><div class="navlabel">GO TO</div><a href="publish.html">Publishing hub</a><a href="ceo_dashboard.html">CEO dashboard</a></nav><main><h1>Trade alerts</h1><div class="sub">One Trade-of-the-Week-style idea a day, from the desk.</div><section class="article"><p class="intro">No trade idea yet. The first one lands after the next EOD run.</p></section></main></div></body></html>
